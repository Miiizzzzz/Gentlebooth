<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Filter Cam 🐱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a12;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --text: #f0f0f5;
      --text-dim: #999;
      --pink: #e879f9;
      --indigo: #818cf8;
    }
    html, body {
      height: 100svh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 520px;
      margin: 0 auto;
      height: 100svh;
    }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 50;
      transition: opacity 0.4s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-icon { font-size: 60px; animation: bounce 1s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-10px); } }
    .loading-title {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(90deg, var(--pink), var(--indigo));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .loading-status { font-size: 13px; color: var(--text-dim); }
    .progress-bar { width: 180px; height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--indigo)); width: 0%; transition: width 0.4s; border-radius: 4px; }

    /* ── HEADER ── */
    .header {
      width: 100%; padding: 12px 20px 8px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .back-btn { font-size: 12px; color: var(--text-dim); text-decoration: none; background: var(--surface2); padding: 5px 12px; border-radius: 50px; }
    .app-title {
      font-size: 16px; font-weight: 800;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .icon-btn {
      width: 38px; height: 38px;
      background: var(--surface2); border: none; border-radius: 50%;
      font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .icon-btn:active { transform: scale(0.88); }

    /* ── CAMERA ── */
    .preview-wrap { width: 100%; padding: 0 14px; flex: 1; min-height: 0; display: flex; flex-direction: column; }
    canvas#output {
      width: 100%; flex: 1; min-height: 0;
      border-radius: 22px; display: block;
      background: #111;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      object-fit: cover;
    }
    video#video { display: none; }
    .flash { position: absolute; inset: 0; margin: 0 14px; border-radius: 22px; background: white; pointer-events: none; opacity: 0; }
    .flash.pop { animation: flash-anim 0.45s ease-out forwards; }
    @keyframes flash-anim { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 0;
      background: var(--surface); border-radius: 12px;
      padding: 3px; margin: 8px 14px 4px;
      flex-shrink: 0; width: calc(100% - 28px);
    }
    .tab-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 12px; font-weight: 700;
      padding: 7px 0; border-radius: 9px;
      font-family: inherit; letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active { background: var(--surface2); color: white; }

    /* ── FILTER STRIP ── */
    .filter-strip-wrap {
      width: 100%; background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 10px 0; flex-shrink: 0;
    }
    .filter-strip { width: 100%; padding: 0 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; display: flex; gap: 8px; touch-action: pan-x; }
    .filter-strip::-webkit-scrollbar { display: none; }

    .f-chip {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      cursor: pointer; user-select: none; -webkit-user-select: none;
    }
    .f-chip:active .f-circle { transform: scale(0.88); }
    .f-chip.active .f-circle { border-color: var(--pink); box-shadow: 0 0 12px rgba(232,121,249,0.4); transform: scale(1.08); }
    .f-chip.active .f-label { color: var(--pink); }
    .f-circle {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      border: 3px solid rgba(255,255,255,0.12);
      background: var(--surface2);
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .f-label { font-size: 10px; font-weight: 700; color: #bbb; white-space: nowrap; transition: color 0.15s; }

    /* ── SNAP ── */
    .snap-row { margin: 10px 0 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .snap-btn {
      width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer;
      background: conic-gradient(var(--pink), var(--indigo), var(--pink));
      padding: 4px;
      box-shadow: 0 0 24px rgba(232,121,249,0.4);
      transition: transform 0.15s;
    }
    .snap-btn:active { transform: scale(0.9); }
    .snap-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .snap-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 26px; }

    /* ── CAPTURED ── */
    .captured-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 24px; z-index: 40;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .captured-overlay.show { opacity: 1; pointer-events: all; }
    .captured-img { max-width: 100%; max-height: 68vh; border-radius: 20px; box-shadow: 0 12px 48px rgba(0,0,0,0.7); }
    .captured-actions { display: flex; gap: 12px; }
    .btn-retake { background: var(--surface2); color: var(--text); border: none; border-radius: 50px; padding: 13px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-save { background: linear-gradient(135deg, var(--pink), var(--indigo)); color: #fff; border: none; border-radius: 50px; padding: 13px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🐱</div>
    <div class="loading-title">Filter Cam</div>
    <div class="loading-status" id="loadingStatus">กำลังโหลด...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="header">
    <a class="back-btn" href="../">← กลับ</a>
    <span class="app-title">MediaPipe 🟢</span>
    <button class="icon-btn" title="พลิกกล้อง" id="flipBtn">🔄</button>
  </div>

  <div class="preview-wrap" style="position:relative">
    <canvas id="output"></canvas>
    <video id="video" playsinline autoplay muted></video>
    <div class="flash" id="flash"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-sticker" onclick="switchTab('sticker')">🐱 สติ๊กเกอร์</button>
    <button class="tab-btn" id="tab-color" onclick="switchTab('color')">🎨 สีโทน</button>
  </div>

  <div class="filter-strip-wrap">
    <div class="filter-strip" id="filterStrip"></div>
  </div>

  <div class="snap-row">
    <button class="snap-btn" id="snapBtn" onclick="takeSnap()" disabled>
      <div class="snap-inner">📸</div>
    </button>
  </div>

  <div class="captured-overlay" id="capturedOverlay">
    <img class="captured-img" id="capturedImg" src="" alt="captured"/>
    <div class="captured-actions">
      <button class="btn-retake" onclick="retake()">↩ ถ่ายใหม่</button>
      <a class="btn-save" id="saveBtn" download="filter-cam.jpg">⬇ บันทึก</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
  const canvas   = document.getElementById('output');
  const ctx      = canvas.getContext('2d');
  const video    = document.getElementById('video');
  const flashEl  = document.getElementById('flash');
  const snapBtn  = document.getElementById('snapBtn');
  const overlay  = document.getElementById('capturedOverlay');
  const captImg  = document.getElementById('capturedImg');
  const saveLink = document.getElementById('saveBtn');
  const stripEl  = document.getElementById('filterStrip');
  const loadSt   = document.getElementById('loadingStatus');
  const progFill = document.getElementById('progressFill');
  const loadScr  = document.getElementById('loadingScreen');

  const STICKERS = [
    { id:'none',    emoji:'✨', name:'ปกติ',     color:'#4b5563' },
    { id:'cat',     emoji:'🐱', name:'แมว',      color:'#f472b6' },
    { id:'dog',     emoji:'🐶', name:'หมา',      color:'#f59e0b' },
    { id:'crown',   emoji:'👑', name:'มงกุฎ',    color:'#eab308' },
    { id:'glasses', emoji:'🕶️', name:'แว่น',    color:'#06b6d4' },
    { id:'flowers', emoji:'🌸', name:'ดอกไม้',   color:'#ec4899' },
    { id:'blush',   emoji:'🥰', name:'แก้มชมพู', color:'#fb7185' },
    { id:'star',    emoji:'⭐', name:'ดาว',      color:'#fbbf24' },
  ];

  const COLORS = [
    { id:'none',    emoji:'✨', name:'ปกติ',     color:'#4b5563', css:'none' },
    { id:'warm',    emoji:'🌅', name:'อบอุ่น',   color:'#f97316', css:'brightness(1.08) saturate(1.6) hue-rotate(15deg)' },
    { id:'cool',    emoji:'❄️', name:'เย็น',     color:'#38bdf8', css:'hue-rotate(185deg) saturate(1.4) brightness(1.1)' },
    { id:'vintage', emoji:'📷', name:'วินเทจ',   color:'#92400e', css:'sepia(0.75) contrast(1.1) brightness(0.92)' },
    { id:'noir',    emoji:'🎬', name:'Noir',      color:'#374151', css:'grayscale(1) contrast(1.4) brightness(0.85)' },
    { id:'vivid',   emoji:'🌈', name:'สดจัด',    color:'#06b6d4', css:'saturate(2.5) contrast(1.15)' },
    { id:'dreamy',  emoji:'💫', name:'ฝัน',      color:'#a78bfa', css:'brightness(1.25) saturate(1.1) blur(0.8px)' },
  ];

  let activeSticker = 'none';
  let activeColor   = 'none';
  let currentTab    = 'sticker';
  let isFlipped     = true;
  let latestLandmarks = [];

  function buildStrip(list) {
    stripEl.innerHTML = '';
    list.forEach(f => {
      const chip = document.createElement('div');
      chip.className = 'f-chip' + (f.id === 'none' ? ' active' : '');
      chip.dataset.id = f.id;
      chip.innerHTML = `<div class="f-circle" style="background:${f.color}22"><span>${f.emoji}</span></div><span class="f-label">${f.name}</span>`;
      chip.addEventListener('click', () => {
        if (currentTab === 'sticker') activeSticker = f.id;
        else activeColor = f.id;
        stripEl.querySelectorAll('.f-chip').forEach(c => c.classList.toggle('active', c.dataset.id === f.id));
        chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
      stripEl.appendChild(chip);
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-sticker').classList.toggle('active', tab === 'sticker');
    document.getElementById('tab-color').classList.toggle('active', tab === 'color');
    buildStrip(tab === 'sticker' ? STICKERS : COLORS);
    const activeId = tab === 'sticker' ? activeSticker : activeColor;
    const activeChip = stripEl.querySelector(`[data-id="${activeId}"]`);
    if (activeChip) activeChip.classList.add('active');
  }

  buildStrip(STICKERS);

  document.getElementById('flipBtn').addEventListener('click', () => { isFlipped = !isFlipped; });

  // ── MEDIAPIPE SETUP ──
  function setProgress(pct, msg) {
    progFill.style.width = pct + '%';
    loadSt.textContent = msg;
  }

  setProgress(20, 'โหลด FaceMesh...');

  const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });

  faceMesh.setOptions({
    maxNumFaces: 4,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults(results => {
    const W = results.image.width;
    const H = results.image.height;
    if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }

    ctx.save();
    ctx.clearRect(0, 0, W, H);

    // Apply color filter + flip
    const colorCss = COLORS.find(c => c.id === activeColor)?.css || 'none';
    ctx.filter = colorCss;
    if (isFlipped) { ctx.translate(W, 0); ctx.scale(-1, 1); }
    ctx.drawImage(results.image, 0, 0);
    ctx.restore();

    // Draw stickers
    if (results.multiFaceLandmarks && activeSticker !== 'none') {
      results.multiFaceLandmarks.forEach(lms => {
        try {
          const m = lms.map(l => ({ x: isFlipped ? 1 - l.x : l.x, y: l.y }));
          drawSticker(m, W, H);
        } catch(e) { console.warn('sticker draw error:', e); }
      });
    }
  });

  setProgress(60, 'เปิดกล้อง...');

  const camera = new Camera(video, {
    onFrame: async () => { await faceMesh.send({ image: video }); },
    width: 1280, height: 720,
  });

  camera.start().then(() => {
    setProgress(100, 'พร้อมแล้ว!');
    setTimeout(() => { loadScr.classList.add('hide'); snapBtn.disabled = false; }, 500);
  }).catch(e => { loadSt.textContent = 'ไม่สามารถเปิดกล้องได้: ' + e.message; });

  // ── STICKER DRAWING ──
  function drawSticker(lms, W, H) {
    const p = (i) => ({ x: lms[i].x * W, y: lms[i].y * H });
    const faceW = Math.abs((lms[454].x - lms[234].x) * W);
    const topY  = lms[10].y * H;
    const topX  = lms[10].x * W;

    switch (activeSticker) {
      case 'cat':     drawCatEars(p, faceW, topX, topY); drawWhiskers(p, faceW); break;
      case 'dog':     drawDogEars(p, faceW, topX, topY); break;
      case 'crown':   drawCrown(p, faceW, topX, topY); break;
      case 'glasses': drawGlasses(p, faceW); break;
      case 'flowers': drawFlowerCrown(faceW, topX, topY); break;
      case 'blush':   drawBlush(p, faceW); break;
      case 'star':    drawStars(faceW, topX, topY); break;
    }
  }

  function drawCatEars(p, faceW, topX, topY) {
    const s = faceW * 0.22;
    [[-0.28, -1], [0.28, 1]].forEach(([dx]) => {
      const cx = topX + faceW * dx;
      const cy = topY - s * 0.2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.moveTo(0, s * 0.8);
      ctx.lineTo(-s * 0.55, -s * 0.85);
      ctx.lineTo(s * 0.55, -s * 0.85);
      ctx.closePath();
      ctx.fillStyle = '#ff9eb5'; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, s * 0.4);
      ctx.lineTo(-s * 0.28, -s * 0.55);
      ctx.lineTo(s * 0.28, -s * 0.55);
      ctx.closePath();
      ctx.fillStyle = '#ffd6e0'; ctx.fill();
      ctx.restore();
    });
  }

  function drawWhiskers(p, faceW) {
    const nose = p(1);
    const len = faceW * 0.22;
    ctx.save();
    ctx.strokeStyle = 'rgba(80,80,80,0.7)';
    ctx.lineWidth = faceW * 0.012;
    ctx.lineCap = 'round';
    [[-1, -0.08], [-1, 0.08], [-1, 0.22], [1, -0.08], [1, 0.08], [1, 0.22]].forEach(([dir, dy]) => {
      ctx.beginPath();
      ctx.moveTo(nose.x, nose.y + faceW * dy);
      ctx.lineTo(nose.x + dir * len, nose.y + faceW * (dy + dir * 0.04));
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawDogEars(p, faceW, topX, topY) {
    const w = faceW * 0.3; const h = faceW * 0.42;
    [[-0.52, 0.08], [0.52, -0.08]].forEach(([dx, rot]) => {
      ctx.save();
      ctx.translate(topX + faceW * dx, topY + h * 0.05);
      ctx.rotate(rot);
      ctx.beginPath();
      ctx.ellipse(0, h * 0.3, w * 0.48, h * 0.54, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#c8a26b'; ctx.fill();
      ctx.strokeStyle = '#a0845a'; ctx.lineWidth = faceW * 0.012; ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(0, h * 0.38, w * 0.28, h * 0.36, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#e8c99a'; ctx.fill();
      ctx.restore();
    });
  }

  function drawCrown(p, faceW, topX, topY) {
    const cw = faceW * 0.78; const ch = faceW * 0.38;
    const x = topX - cw / 2; const y = topY - ch * 1.05;
    ctx.save();
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#e6a800'; ctx.lineWidth = faceW * 0.016;
    ctx.beginPath();
    ctx.moveTo(x, y + ch);
    ctx.lineTo(x, y + ch * 0.35);
    ctx.lineTo(x + cw * 0.18, y + ch * 0.65);
    ctx.lineTo(x + cw * 0.32, y);
    ctx.lineTo(x + cw * 0.5, y + ch * 0.55);
    ctx.lineTo(x + cw * 0.68, y);
    ctx.lineTo(x + cw * 0.82, y + ch * 0.65);
    ctx.lineTo(x + cw, y + ch * 0.35);
    ctx.lineTo(x + cw, y + ch);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    [['#ff4444', 0.25], ['#4488ff', 0.5], ['#ff4444', 0.75]].forEach(([c, t]) => {
      ctx.beginPath();
      ctx.arc(x + cw * t, y + ch * 0.55, ch * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = c; ctx.fill();
    });
    ctx.restore();
  }

  function drawGlasses(p, faceW) {
    const le = { x: (p(33).x + p(133).x) / 2, y: (p(33).y + p(133).y) / 2 };
    const re = { x: (p(263).x + p(362).x) / 2, y: (p(263).y + p(362).y) / 2 };
    const r = faceW * 0.14;
    ctx.save();
    ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = r * 0.16;
    ctx.fillStyle = 'rgba(100,180,255,0.22)';
    [le, re].forEach(e => {
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    });
    ctx.beginPath(); ctx.moveTo(le.x + r, le.y); ctx.lineTo(re.x - r, re.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(le.x - r, le.y); ctx.lineTo(le.x - r * 1.6, le.y - r * 0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(re.x + r, re.y); ctx.lineTo(re.x + r * 1.6, re.y - r * 0.2); ctx.stroke();
    ctx.restore();
  }

  function drawFlowerCrown(faceW, topX, topY) {
    const fr = faceW * 0.07; const count = 8;
    const colors = ['#ff9eb5','#ffb347','#ff6b9d','#ffd700','#c8a2c8','#ff9eb5','#7ec8e3','#ffa07a'];
    for (let i = 0; i < count; i++) {
      const t = (i / (count - 1)) - 0.5;
      const fx = topX + t * faceW * 1.0;
      const fy = topY - fr * 3 - (1 - Math.abs(t * 2)) * faceW * 0.05;
      drawFlower(fx, fy, fr, colors[i]);
    }
  }

  function drawFlower(x, y, r, color) {
    ctx.save();
    for (let i = 0; i < 5; i++) {
      ctx.save(); ctx.translate(x, y); ctx.rotate((i / 5) * Math.PI * 2);
      ctx.beginPath(); ctx.ellipse(0, -r * 1.3, r * 0.5, r * 0.85, 0, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill(); ctx.restore();
    }
    ctx.beginPath(); ctx.arc(x, y, r * 0.48, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.restore();
  }

  function drawBlush(p, faceW) {
    const lc = p(116); const rc = p(345);
    const r = faceW * 0.11;
    ctx.save(); ctx.globalAlpha = 0.45;
    [lc, rc].forEach(c => {
      const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, r);
      grad.addColorStop(0, '#ff9eb5'); grad.addColorStop(1, 'rgba(255,158,181,0)');
      ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
    });
    ctx.restore();
  }

  function drawStars(faceW, topX, topY) {
    const positions = [
      [topX - faceW * 0.45, topY - faceW * 0.35, faceW * 0.09],
      [topX, topY - faceW * 0.55, faceW * 0.13],
      [topX + faceW * 0.45, topY - faceW * 0.35, faceW * 0.09],
      [topX - faceW * 0.25, topY - faceW * 0.55, faceW * 0.07],
      [topX + faceW * 0.25, topY - faceW * 0.55, faceW * 0.07],
    ];
    positions.forEach(([x, y, r]) => drawStar(x, y, r));
  }

  function drawStar(x, y, r) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#FFA500'; ctx.lineWidth = r * 0.1;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const outer = { x: Math.cos((i * 4 * Math.PI) / 5 - Math.PI / 2) * r, y: Math.sin((i * 4 * Math.PI) / 5 - Math.PI / 2) * r };
      const inner = { x: Math.cos(((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2) * r * 0.4, y: Math.sin(((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2) * r * 0.4 };
      i === 0 ? ctx.moveTo(outer.x, outer.y) : ctx.lineTo(outer.x, outer.y);
      ctx.lineTo(inner.x, inner.y);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // ── SNAP ──
  window.takeSnap = function() {
    doFlash();
    const url = canvas.toDataURL('image/jpeg', 0.95);
    captImg.src = url;
    saveLink.href = url;
    overlay.classList.add('show');
  };

  window.retake = function() { overlay.classList.remove('show'); };

  function doFlash() {
    flashEl.classList.remove('pop'); void flashEl.offsetWidth; flashEl.classList.add('pop');
  }
  </script>
</body>
</html>
