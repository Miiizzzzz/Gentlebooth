<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Filter Cam 🐱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --surface: #14141f;
      --surface2: #1e1e2e;
      --text: #f0f0f5;
      --text-dim: #888;
      --pink: #e879f9;
      --indigo: #818cf8;
    }

    html, body {
      height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 520px;
      margin: 0 auto;
      height: 100svh;
    }

    /* ── LOADING SCREEN ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 50;
      transition: opacity 0.4s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }

    .loading-icon { font-size: 64px; animation: bounce 1s infinite alternate; }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .loading-title {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--pink), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-status {
      font-size: 13px;
      color: var(--text-dim);
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--indigo));
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      padding: 12px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--pink), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── AR PREVIEW ── */
    .preview-wrap {
      width: 100%;
      padding: 0 14px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #ar-preview {
      width: 100%;
      flex: 1;
      min-height: 0;
      border-radius: 22px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      position: relative;
    }

    /* DeepAR injects a canvas inside this div */
    #ar-preview canvas,
    #ar-preview video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      border-radius: 22px;
    }

    /* Flash */
    .flash {
      position: absolute;
      inset: 0;
      background: white;
      border-radius: 22px;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
    }
    .flash.pop { animation: flash-anim 0.45s ease-out forwards; }
    @keyframes flash-anim {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── FILTER NAME ── */
    .filter-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin: 6px 0 2px;
      letter-spacing: 0.04em;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── FILTER STRIP ── */
    .filter-strip-wrap {
      width: 100%;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 0;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .filter-strip {
      width: 100%;
      padding: 0 14px;
      overflow-x: auto;
      scrollbar-width: none;
      display: flex;
      gap: 10px;
    }
    .filter-strip::-webkit-scrollbar { display: none; }

    .f-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .f-chip:active .f-circle { transform: scale(0.88); }
    .f-chip.active .f-circle {
      border-color: var(--pink);
      box-shadow: 0 0 12px rgba(232,121,249,0.5);
      transform: scale(1.08);
    }
    .f-chip.active .f-label { color: var(--pink); }

    .f-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border: 3px solid rgba(255,255,255,0.15);
      background: var(--surface2);
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .f-label {
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      transition: color 0.15s;
      white-space: nowrap;
    }

    /* ── SNAP BUTTON ── */
    .snap-row {
      margin-top: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .snap-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: conic-gradient(var(--pink), var(--indigo), var(--pink));
      padding: 4px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 28px rgba(232,121,249,0.45);
    }
    .snap-btn:active  { transform: scale(0.9); }
    .snap-btn:disabled{ opacity: 0.4; cursor: not-allowed; transform: none; }

    .snap-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    /* ── CAPTURED OVERLAY ── */
    .captured-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .captured-overlay.show { opacity: 1; pointer-events: all; }

    .captured-img {
      max-width: 100%;
      max-height: 68vh;
      border-radius: 20px;
      display: block;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
    }

    .captured-actions { display: flex; gap: 12px; }

    .btn-retake {
      background: var(--surface2);
      color: var(--text);
      border: none;
      border-radius: 50px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-retake:active { transform: scale(0.95); }

    .btn-save {
      background: linear-gradient(135deg, var(--pink), var(--indigo));
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 16px rgba(232,121,249,0.3);
    }
    .btn-save:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">🐱</div>
    <div class="loading-title">Filter Cam</div>
    <div class="loading-status" id="loadingStatus">กำลังโหลด...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- App -->
  <div class="header">
    <span class="app-title">Filter Cam 🐱</span>
  </div>

  <div class="preview-wrap">
    <div id="ar-preview">
      <div class="flash" id="flash"></div>
    </div>
  </div>

  <div class="filter-name" id="filterName">✨ ไม่มีฟิลเตอร์</div>
  <div class="filter-strip-wrap">
    <div class="filter-strip" id="filterStrip"></div>
  </div>

  <div class="snap-row">
    <button class="snap-btn" id="snapBtn" onclick="takePhoto()" disabled>
      <div class="snap-inner">📸</div>
    </button>
  </div>

  <!-- Captured -->
  <div class="captured-overlay" id="capturedOverlay">
    <img class="captured-img" id="capturedImg" src="" alt="captured"/>
    <div class="captured-actions">
      <button class="btn-retake" onclick="retake()">↩ ถ่ายใหม่</button>
      <a class="btn-save" id="saveBtn" download="filter-cam.jpg">⬇ บันทึก</a>
    </div>
  </div>

  <script type="module">
    import * as deepar from 'https://cdn.jsdelivr.net/npm/deepar@5.6.22/js/deepar.esm.js';

    const BASE   = 'https://cdn.jsdelivr.net/npm/deepar@5.6.22/effects/';
    const LICENSE = '5c45eac1e0ba1091078925545c91779ce82a20582de19f9b8e15a8e705c94ed9aa2b3d09ee26b2e8';

    const FILTERS = [
      { id: 'none',                   emoji: '✨', name: 'ปกติ',         color: '#4b5563', path: null },
      { id: 'dalmatian',              emoji: '🐶', name: 'ดัลเมเชียน',   color: '#f59e0b', path: BASE + 'dalmatian' },
      { id: 'lion',                   emoji: '🦁', name: 'สิงโต',        color: '#f97316', path: BASE + 'lion' },
      { id: 'koala',                  emoji: '🐨', name: 'โคอาล่า',      color: '#6b7280', path: BASE + 'koala' },
      { id: 'aviators',               emoji: '🕶️', name: 'แว่นกันแดด',   color: '#06b6d4', path: BASE + 'aviators' },
      { id: 'galaxy_background',      emoji: '🌌', name: 'กาแล็กซี่',    color: '#7c3aed', path: BASE + 'galaxy_background' },
      { id: 'background_blur',        emoji: '🌫️', name: 'เบลอฉากหลัง', color: '#94a3b8', path: BASE + 'background_blur.deepar' },
    ];

    let deepAR = null;
    let activeId = 'none';

    const loadingScreen = document.getElementById('loadingScreen');
    const loadingStatus = document.getElementById('loadingStatus');
    const progressFill  = document.getElementById('progressFill');
    const filterStrip   = document.getElementById('filterStrip');
    const filterName    = document.getElementById('filterName');
    const snapBtn       = document.getElementById('snapBtn');
    const flashEl       = document.getElementById('flash');
    const overlay       = document.getElementById('capturedOverlay');
    const captImg       = document.getElementById('capturedImg');
    const saveBtn       = document.getElementById('saveBtn');

    // Build chips
    FILTERS.forEach(f => {
      const chip = document.createElement('div');
      chip.className = 'f-chip' + (f.id === 'none' ? ' active' : '');
      chip.dataset.id = f.id;
      chip.innerHTML = `
        <div class="f-circle" style="background:${f.color}22">
          <span>${f.emoji}</span>
        </div>
        <span class="f-label">${f.name}</span>`;
      chip.addEventListener('click', () => setFilter(f));
      filterStrip.appendChild(chip);
    });

    async function setFilter(f) {
      if (!deepAR || activeId === f.id) return;
      activeId = f.id;

      document.querySelectorAll('.f-chip').forEach(c =>
        c.classList.toggle('active', c.dataset.id === f.id)
      );
      filterName.textContent = f.emoji + ' ' + f.name;

      if (f.path) {
        await deepAR.switchEffect(f.path);
      } else {
        await deepAR.clearEffect();
      }
    }

    // Init DeepAR
    setProgress(10, 'กำลังโหลด SDK...');

    try {
      deepAR = await deepar.initialize({
        licenseKey: LICENSE,
        previewElement: document.getElementById('ar-preview'),
        rootPath: 'https://cdn.jsdelivr.net/npm/deepar@5.6.22/',
        additionalOptions: { cameraConfig: { facingMode: 'user' } }
      });

      setProgress(70, 'กำลังเปิดกล้อง...');
      await deepAR.startCamera({ facingMode: 'user' });

      setProgress(100, 'พร้อมแล้ว!');
      setTimeout(() => {
        loadingScreen.classList.add('hide');
        snapBtn.disabled = false;
      }, 400);

    } catch (err) {
      loadingStatus.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
      console.error(err);
    }

    function setProgress(pct, msg) {
      progressFill.style.width = pct + '%';
      loadingStatus.textContent = msg;
    }

    // Snap
    window.takePhoto = async function() {
      if (!deepAR) return;
      doFlash();
      try {
        const dataUrl = await deepAR.takeScreenshot();
        captImg.src = dataUrl;
        saveBtn.href = dataUrl;
        overlay.classList.add('show');
      } catch (e) {
        console.error('Screenshot error:', e);
      }
    };

    window.retake = function() {
      overlay.classList.remove('show');
    };

    function doFlash() {
      flashEl.classList.remove('pop');
      void flashEl.offsetWidth;
      flashEl.classList.add('pop');
    }
  </script>
</body>
</html>
